<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty zone</title>
    <link rel="stylesheet" href="css/main.min.css"/>
</head>
<body>
    <header class="header" id="header">
        <div class="container">
            <div class="header__container">
                <nav class="header__nav">
                    <a href="/" class="logo">
                        <img src="./images/logo/logo.svg" alt="logo">
                    </a>
                    <ul class="header__menu">
                        <li class="header__menu-item active"><a href="#" class="link">Про нас</a></li>
                        <li class="header__menu-item"><a href="#" class="link">Чому ми</a></li>
                        <li class="header__menu-item"><a href="#" class="link">Наші процедури</a></li>
                        <li class="header__menu-item"><a href="#" class="link ">Контакти</a></li>
                    </ul>
                </nav>
                <div class="header__social">
                    <div class="social">
                        <div class="social__content">
                            <a href="#">
                                <svg class="social__content-icon" width="32" height="32">
                                    <use href="./images/icons/icons.svg#icon-telephone"></use>
                                </svg>
                            </a>
                            <a href="#">
                                <svg class="social__content-icon" width="32" height="32">
                                    <use href="./images/icons/icons.svg#icon-facebook"></use>
                                </svg>
                            </a>
                            <a href="#">
                                <svg class="social__content-icon" width="32" height="32">
                                    <use href="./images/icons/icons.svg#icon-instagram"></use>
                                </svg>
                            </a>
                        </div>
                    </div>
                </div>
                <button class="header__burger menu-btn-open" type="button">
                    <span></span>
                </button>
                <div class="mobile-menu">
                    <button class="mobile-menu__btn-close menu-btn-close" type="button"></button>
                        <a href="/" class="mobile-menu__logo"><img src="./images/logo/logo.svg" alt="logo"></a>
                        <ul class="mobile-menu__list">
                            <li><a href="#" class="mobile-menu__link">Про нас</a></li>
                            <li><a href="#" class="mobile-menu__link">Чому ми</a></li>
                            <li><a href="#" class="mobile-menu__link">Наші процедури</a></li>
                            <li><a href="#" class="mobile-menu__link">Контакти</a></li>
                        </ul>
                        <div class="mobile-menu__social">
                            <div class="social">
                                <div class="social__content">
                                    <a href="#">
                                        <svg class="social__content-icon" width="32" height="32">
                                            <use href="./images/icons/icons.svg#icon-telephone"></use>
                                        </svg>
                                    </a>
                                    <a href="#">
                                        <svg class="social__content-icon" width="32" height="32">
                                            <use href="./images/icons/icons.svg#icon-facebook"></use>
                                        </svg>
                                    </a>
                                    <a href="#">
                                        <svg class="social__content-icon" width="32" height="32">
                                            <use href="./images/icons/icons.svg#icon-instagram"></use>
                                        </svg>
                                    </a>
                                </div>
                            </div>
                        </div>
                </div>
            </div>
        </div>
    </header>
    <script src="./js/main.js"></script>
</body>
</html>
